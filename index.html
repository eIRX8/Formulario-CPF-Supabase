<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula Escolar - Validação de CPF</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 1.1em;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 18px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.valid {
            border-color: #28a745;
            background-color: #f0fff4;
        }

        input.invalid {
            border-color: #dc3545;
            background-color: #fff5f5;
        }

        .message {
            font-size: 0.95em;
            margin-top: 8px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }

        .message.valid {
            display: block;
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }

        .message.invalid {
            display: block;
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s ease;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .status.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .modal-header h2 {
            color: white;
            margin: 0;
            font-size: 1.5em;
        }

        .modal-body {
            padding: 30px;
            text-align: center;
        }

        .check-icon {
            font-size: 70px;
            color: #28a745;
            margin-bottom: 20px;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .cpf-destacado {
            font-size: 28px;
            font-weight: bold;
            color: #28a745;
            background: #f0fff4;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            letter-spacing: 2px;
            font-family: monospace;
            border: 2px dashed #28a745;
        }

        .mensagem-sucesso {
            color: #28a745;
            font-size: 18px;
            font-weight: 600;
            margin: 10px 0;
        }

        .data-hora {
            color: #666;
            font-size: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .modal-footer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .btn-modal {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-modal:hover {
            transform: scale(1.05);
        }

        .modal-close {
            position: absolute;
            right: 15px;
            top: 15px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: white;
            width: auto;
            padding: 0;
            margin: 0;
        }

        .modal-close:hover {
            opacity: 0.8;
            transform: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Validação de CPF</h1>
        <p class="subtitle">Digite o CPF para validação e armazenamento</p>

        <form id="cpfForm">
            <div class="form-group">
                <label for="cpf">CPF do aluno *</label>
                <input type="text" 
                       id="cpf" 
                       name="cpf" 
                       placeholder="000.000.000-00" 
                       maxlength="14" 
                       autocomplete="off"
                       required>
                <div id="cpfMessage" class="message"></div>
            </div>

            <button type="submit" id="submitBtn" disabled>Armazenar CPF</button>
        </form>

        <div id="statusMessage" class="status"></div>
        <div class="info">✅ Apenas números são aceitos • Validação em tempo real • Os dados são salvos no Supabase</div>
    </div>

    <!-- Pop-up Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="modal-close" onclick="fecharModal()">&times;</button>
                <h2>✅ CPF Armazenado!</h2>
            </div>
            <div class="modal-body">
                <div class="check-icon">✓</div>
                <div class="mensagem-sucesso">CPF Armazenado com Sucesso!</div>
                <div class="cpf-destacado" id="cpfArmazenado"></div>
                <div class="data-hora" id="dataHoraArmazenamento"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal" onclick="fecharModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================
            // ELEMENTOS DO DOM
            // ============================================
            const cpfInput = document.getElementById('cpf');
            const cpfMessage = document.getElementById('cpfMessage');
            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');
            const modal = document.getElementById('modal');
            const cpfArmazenadoSpan = document.getElementById('cpfArmazenado');
            const dataHoraSpan = document.getElementById('dataHoraArmazenamento');
            let cpfValido = false;

            // ============================================
            // CONFIGURAÇÃO DO SUPABASE
            // ============================================
            const SUPABASE_URL = "https://prnonuuegumluvexjwph.supabase.co/rest/v1";
            const SUPABASE_ANON_KEY = "sb_publishable_jVVuzIO-2Fc6eBW9Qk7v8A_rhMfNAYP";

            // ============================================
            // FUNÇÕES DE MÁSCARA E VALIDAÇÃO DE CPF
            // ============================================
            
            function aplicarMascaraCPF(valor) {
                let numeros = valor.replace(/\D/g, '');
                numeros = numeros.substring(0, 11);
                
                if (numeros.length > 3) {
                    numeros = numeros.replace(/^(\d{3})(\d)/, '$1.$2');
                }
                if (numeros.length > 7) {
                    numeros = numeros.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
                }
                if (numeros.length > 11) {
                    numeros = numeros.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
                }
                return numeros;
            }

            function validarCPF(cpf) {
                const cpfLimpo = cpf.replace(/\D/g, '');
                if (cpfLimpo.length !== 11) return false;
                if (/^(\d)\1+$/.test(cpfLimpo)) return false;
                
                let soma = 0;
                for (let i = 0; i < 9; i++) {
                    soma += parseInt(cpfLimpo.charAt(i)) * (10 - i);
                }
                let resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(cpfLimpo.charAt(9))) return false;
                
                soma = 0;
                for (let i = 0; i < 10; i++) {
                    soma += parseInt(cpfLimpo.charAt(i)) * (11 - i);
                }
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(cpfLimpo.charAt(10))) return false;
                
                return true;
            }

            // ============================================
            // FUNÇÃO PARA SALVAR NO SUPABASE (CORRIGIDA)
            // ============================================
            async function salvarNoSupabase(cpf) {
                const dados = {
                    cpf: cpf,
                    timestamp_br: new Date().toLocaleString('pt-BR')
                };
                
                console.log('📤 Enviando para Supabase:', dados);
                
                const response = await fetch(`${SUPABASE_URL}/cpfs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify(dados)
                });
                
                console.log('📊 Status:', response.status);
                
                // Se a resposta foi bem sucedida (201 Created ou 200 OK)
                if (response.ok) {
                    // Tenta ler o JSON, mas se falhar, considera sucesso
                    try {
                        const resultado = await response.json();
                        console.log('✅ Resposta:', resultado);
                    } catch (e) {
                        console.log('✅ Salvou com sucesso (resposta sem JSON)');
                    }
                    return { success: true };
                } else {
                    const erro = await response.text();
                    throw new Error(`HTTP ${response.status}: ${erro}`);
                }
            }

            // ============================================
            // FUNÇÃO PARA EXIBIR POP-UP
            // ============================================
            function exibirPopup(cpf) {
                const agora = new Date();
                const dataHora = agora.toLocaleDateString('pt-BR') + ' às ' + agora.toLocaleTimeString('pt-BR');
                cpfArmazenadoSpan.textContent = cpf;
                dataHoraSpan.textContent = `Armazenado em: ${dataHora}`;
                modal.style.display = 'block';
            }

            window.fecharModal = function() {
                modal.style.display = 'none';
            }

            // ============================================
            // EVENTO DE DIGITAÇÃO
            // ============================================
            cpfInput.addEventListener('input', function(e) {
                let valor = e.target.value;
                this.classList.remove('valid', 'invalid');
                cpfMessage.className = 'message';
                cpfMessage.style.display = 'none';
                
                if (/[^\d.-]/.test(valor)) {
                    cpfMessage.className = 'message invalid';
                    cpfMessage.textContent = '❌ Insira somente números';
                    cpfMessage.style.display = 'block';
                    this.classList.add('invalid');
                    cpfValido = false;
                    submitBtn.disabled = true;
                    return;
                }
                
                let valorMascarado = aplicarMascaraCPF(valor);
                e.target.value = valorMascarado;
                
                if (valorMascarado.length === 14) {
                    if (validarCPF(valorMascarado)) {
                        cpfMessage.className = 'message valid';
                        cpfMessage.textContent = '✅ CPF válido';
                        cpfMessage.style.display = 'block';
                        this.classList.add('valid');
                        cpfValido = true;
                        submitBtn.disabled = false;
                    } else {
                        cpfMessage.className = 'message invalid';
                        cpfMessage.textContent = '❌ CPF inválido';
                        cpfMessage.style.display = 'block';
                        this.classList.add('invalid');
                        cpfValido = false;
                        submitBtn.disabled = true;
                    }
                } else {
                    cpfValido = false;
                    submitBtn.disabled = true;
                }
            });

            cpfInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const textoColado = (e.clipboardData || window.clipboardData).getData('text');
                const apenasNumeros = textoColado.replace(/\D/g, '').substring(0, 11);
                this.value = aplicarMascaraCPF(apenasNumeros);
                this.dispatchEvent(new Event('input'));
            });

            // ============================================
            // EVENTO DE SUBMISSÃO
            // ============================================
            document.getElementById('cpfForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                statusMessage.style.display = 'none';
                statusMessage.className = 'status';
                
                if (!cpfValido) {
                    statusMessage.className = 'status error';
                    statusMessage.textContent = '❌ CPF inválido. Verifique o número digitado.';
                    statusMessage.style.display = 'block';
                    setTimeout(() => { statusMessage.style.display = 'none'; }, 3000);
                    return;
                }
                
                const cpfFormatado = cpfInput.value;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading-spinner"></span> Salvando...';
                
                try {
                    await salvarNoSupabase(cpfFormatado);
                    exibirPopup(cpfFormatado);
                    
                    statusMessage.className = 'status success';
                    statusMessage.innerHTML = `✅ CPF ${cpfFormatado} salvo com sucesso!`;
                    statusMessage.style.display = 'block';
                    
                    cpfInput.value = '';
                    cpfInput.classList.remove('valid');
                    cpfMessage.style.display = 'none';
                    cpfValido = false;
                    submitBtn.disabled = true;
                    
                    setTimeout(() => { statusMessage.style.display = 'none'; }, 5000);
                } catch (error) {
                    console.error('❌ Erro:', error);
                    statusMessage.className = 'status error';
                    statusMessage.innerHTML = `❌ Erro ao salvar: ${error.message}`;
                    statusMessage.style.display = 'block';
                    submitBtn.disabled = !cpfValido;
                    setTimeout(() => { statusMessage.style.display = 'none'; }, 5000);
                } finally {
                    submitBtn.innerHTML = 'Armazenar CPF';
                }
            });

            window.addEventListener('click', function(e) {
                if (e.target === modal) fecharModal();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.style.display === 'block') fecharModal();
            });

            console.log('✅ Formulário pronto!');
        })();
    </script>
</body>
</html>
